name: python lint
on:
    workflow_dispatch:

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:

            - name: checkuot code
              uses: actions/checkout@v4

            -  name: setup python
               uses: actions/setup-python@v6
               with:
                python-version: '3.10'

            - name: Install Dependencies
              run: pip install -r requirements.txt

            - name: Run Lint
              run: flake8 app.py 

